<!-- Reusable Author Card — powered by _data/dyllan.yml -->
<div class="author-card">
    {% if site.data.dyllan.avatar %}
    <div class="author-avatar">
        <img src="{{ site.baseurl }}{{ site.data.dyllan.avatar }}" alt="{{ site.data.dyllan.name }}">
    </div>
    {% endif %}
    <div class="author-info">
        <h3 class="author-name">{{ site.data.dyllan.name }}</h3>
        <p class="author-title">{{ site.data.dyllan.title }} @ {{ site.data.dyllan.company }}</p>
        {% if site.data.dyllan.tagline %}
        <p class="author-tagline">{{ site.data.dyllan.tagline }}</p>
        {% endif %}
    </div>
</div>
