title: "Duan Nguyen Duy | Portfolio"
email: duannguyen2606@gmail.com
description: >- # this means to ignore newlines until "baseurl:"
  Personal Portfolio, Academic Hub, and Learning Journey of Duan Nguyen Duy.
  Data Engineer at Dentsu Vietnam (Merkle CXM).
baseurl: "/Portfolio" # Important: GitHub Pages project site
url: "https://duan-n2d.github.io"
talkmap_link: false

# Collections
collections:
  posts:
    output: true
    permalink: /posts/:year/:month/:day/:title/

# Markdown settings
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  hard_wrap: false

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-redirect-from

# Defaults
defaults:
  - scope:
      path: ""
    values:
      layout: "default"
  - scope:
      path: "learning"
    values:
      layout: "default"
      sidebar: true

sass:
  style: compressed

exclude:
  - .github
  - .git
  - Gemfile
  - Gemfile.lock
  - node_modules
  - README.md
  - CONTRIBUTING.md
