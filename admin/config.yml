backend:
  name: github
  repo: duan-n2d/duan-n2d.github.io
  branch: master

media_folder: "src/images"
public_folder: "/src/images"

collections:
  - name: "posts"
    label: "Blog Posts"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Layout", name: "layout", widget: "hidden", default: "single"}
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Date", name: "date", widget: "datetime"}
      - {label: "Excerpt", name: "excerpt", widget: "text"}
      - {label: "Body", name: "body", widget: "markdown"}

  - name: "projects"
    label: "Projects"
    folder: "data/projects"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Category", name: "category", widget: "string"}
      - {label: "Date", name: "date", widget: "datetime"}
      - {label: "Tags", name: "tags", widget: "list"}
      - {label: "Status", name: "status", widget: "select", options: ["Completed", "In Progress", "Planned"]}
      - {label: "Role", name: "role", widget: "string"}
      - {label: "Tech Stack", name: "tech_stack", widget: "list"}
      - {label: "Body", name: "body", widget: "markdown"}

  - name: "learning-de"
    label: "Learning — Data Engineer"
    folder: "data/learning/data_engineer"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Category", name: "category", widget: "hidden", default: "data_engineer"}
      - {label: "Date", name: "date", widget: "datetime"}
      - {label: "Tags", name: "tags", widget: "list"}
      - {label: "Difficulty", name: "difficulty", widget: "select", options: ["Beginner", "Intermediate", "Advanced"]}
      - {label: "Body", name: "body", widget: "markdown"}

