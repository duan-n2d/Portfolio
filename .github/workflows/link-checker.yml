name: Link Checker

on:
  schedule:
    - cron: '0 0 * * 0' # Weekly on Sundays
  workflow_dispatch:
  push:
    branches: ["master", "main"]

jobs:
  linkChecker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true

      - name: Build with Jekyll
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Link Checker
        uses: lycheeverse/lychee-action@v2
        with:
          # Provide --root-dir and --remap so Lychee can parse root-relative links correctly.
          # We still use --scheme https,http to check only external links and avoid 404s on local directories.
          args: --verbose --no-progress --exclude-all-private --root-dir "./_site" --remap "/Portfolio/ /" --scheme https,http "./_site/**/*.html"
          fail: true
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
