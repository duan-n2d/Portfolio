name: Link Checker

on:
  schedule:
    - cron: '0 0 * * 0' # Weekly on Sundays
  workflow_dispatch:
  push:
    branches: ["master", "main"]

jobs:
  linkChecker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true

      - name: Build with Jekyll
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Link Checker
        uses: lycheeverse/lychee-action@v2
        with:
          # Scan rendered HTML files in the _site directory for external links only
          # Ignoring local links to bypass Jekyll index.html directory mapping issues
          args: --verbose --no-progress --exclude-all-private --scheme https,http "./_site/**/*.html"
          fail: true
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
